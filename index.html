<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>Sign-up Form</title>
</head>
<body>
    
    <div class="wrapper">
        <div class="sidebar">
            <div class="img-bar">
                <h2>ODIN</h2>
            </div>      
        </div>

        <div class="main">
            <div class="text-info">
                <p>
                    This is not a real online service! You know you
                    need something like this in your life to help
                    realize your deepest dreams.
                </p>
                <p>Sign up <em>now</em> to get started</p>
                <p>You <em>know</em> you want to</p>
            </div>

            <form action="">
                <fieldset>
                    <legend>Let's do this!</legend>
                    <div>
                        <label for="">First Name</label>
                        <input type="text">
                    </div>
                    <div>
                        <label for="">Last Name</label>
                        <input type="text">
                    </div>
                    <div>
                        <label for="">Email</label>
                        <input type="text">
                    </div>
                    <div>
                        <label for="">Phone Number</label>
                        <input type="text">
                    </div>
                    <div>
                        <label for="">Password</label>
                        <input type="text">
                    </div>
                    <div>
                        <label for="">Confirm Password</label>
                        <input type="text">
                    </div>

                </fieldset>
                <button>Sign Up</button>
            </form>
            <div class="login">
                <p>Already have an account? Log in</p>
            </div>
        </div>
    </div>

    <p hidden>Photo by <a href="https://unsplash.com/@ninjason?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Jason Leung</a> on <a href="https://unsplash.com/photos/the-golden-gate-bridge-spans-across-the-water-Iwlo4RuPefM?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
</body>
</html>
