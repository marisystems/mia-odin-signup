<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>Sign-up Form</title>
</head>
<body>
    
    <div class="wrapper">
        <aside>
            <div class="img-bar">
                <h2>THEIA</h2>
                <p></p>
            </div>
            <p hidden>Photo by <a href="https://unsplash.com/@ninjason?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Jason Leung</a> on <a href="https://unsplash.com/photos/the-golden-gate-bridge-spans-across-the-water-Iwlo4RuPefM?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
            <p id="credits">Photo by <a href="https://unsplash.com/@kirklai?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Lai Man Nung</a> on <a href="https://unsplash.com/photos/silver-dslr-camera-xU50ZAb6d3o?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
        </aside>

        <main>
            <div class="text-info">
            <div class="text-container">
                <p>
                    Do you have a passion for photography? <span class="accent">Theia</span> is a 
                    project that aims to archive the history and techniques
                    of photography. Sign up now to have access now!
                </p>
                <button>
                    <img 
                    src="./img/sun.svg" 
                    alt="icon of sun"
                    width="80px">
                </button>
            </div>
            </div>
            
            <div>
                <form action="">
                    <fieldset>
                        <legend>Let's do this!</legend>
                        <div>
                            <label for="">First Name</label>
                            <input 
                            type="text"
                            required>
                            <span></span>
                        </div>
                        <div>
                            <label for="">Last Name</label>
                            <input 
                            type="text"
                            required>
                            <span></span>
                        </div>
                        <div>
                            <label for="">Email</label>
                            <input type="email">
                        </div>
                        <div>
                            <label for="">Phone Number</label>
                            <input type="tel">
                        </div>
                        <div>
                            <label for="">Password</label>
                            <input 
                            type="password"
                            minlength="8"
                            maxlength="20"
                            required>
                            <span></span>
                        </div>
                        <div>
                            <label for="">Confirm Password</label>
                            <input 
                            type="password"
                            minlength="8"
                            maxlength="20"
                            required>
                            <span></span>
                        </div>
                    </fieldset>
                    <button>Sign Up</button>
                </form>
            </div>
            <div class="login">
                <p>Already have an account? <a href="">Log in</a></p>
            </div>
        </main>
    </div>

    
</body>
</html>
